services:
  pg-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pg-mcp
    ports:
      - "${PG_MCP_BIND_IP:-0.0.0.0}:38000:8000"
    environment:
      - PG_DSN
      - PG_SSL_CERT
      - PG_SSL_KEY
      - PG_SSL_ROOTCERT
      - PG_SSL_MODE
      - LOG_LEVEL
      - PYTHONUNBUFFERED=1
    volumes:
      - pg-mcp-certs:/secrets/pg:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c 'import socket,sys; s=socket.socket(); s.settimeout(2);
          s.connect(("127.0.0.1",8000)); s.close()' || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pg-mcp-certs:
    external: true
